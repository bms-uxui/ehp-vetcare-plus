<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1320" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6E6E74"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B86A7C"/>
    </marker>

    <style>
      .box { fill:#FFFFFF; stroke:#D0D0D4; stroke-width:1.5; rx:10; }
      .box-hub { fill:#FBF3F4; stroke:#B86A7C; stroke-width:2; rx:10; }
      .box-primary { fill:#B86A7C; stroke:#B86A7C; stroke-width:1.5; rx:10; }
      .box-mod-auth { fill:#FFFFFF; stroke:#B86A7C; stroke-width:1.5; rx:10; }
      .box-mod-pet { fill:#FFFFFF; stroke:#D99A20; stroke-width:1.5; rx:10; }
      .box-mod-appt { fill:#FFFFFF; stroke:#4A8FD1; stroke-width:1.5; rx:10; }
      .box-mod-health { fill:#FFFFFF; stroke:#6CC28A; stroke-width:1.5; rx:10; }
      .box-mod-notif { fill:#FFFFFF; stroke:#E8A87C; stroke-width:1.5; rx:10; }
      .box-mod-ai { fill:#FFFFFF; stroke:#7B5CC8; stroke-width:1.5; rx:10; }
      .box-mod-shop { fill:#FFFFFF; stroke:#4FB36C; stroke-width:1.5; rx:10; }
      .box-mod-profile { fill:#FFFFFF; stroke:#6E6E74; stroke-width:1.5; rx:10; }

      .label { fill:#2E2E33; font-size:13px; font-weight:600; text-anchor:middle; }
      .sub { fill:#6E6E74; font-size:10px; text-anchor:middle; }
      .label-white { fill:#FFFFFF; font-size:14px; font-weight:700; text-anchor:middle; }

      .title { fill:#2E2E33; font-size:24px; font-weight:700; text-anchor:middle; }
      .subtitle { fill:#6E6E74; font-size:13px; text-anchor:middle; }
      .section-label { fill:#B86A7C; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; text-anchor:middle; }

      .edge { stroke:#9A9AA0; stroke-width:1.3; fill:none; }
      .edge-primary { stroke:#B86A7C; stroke-width:1.6; fill:none; }
      .edge-dashed { stroke:#9A9AA0; stroke-width:1.3; fill:none; stroke-dasharray:5,4; }

      .legend-box { fill:#FFFFFF; stroke:#D0D0D4; stroke-width:1; rx:10; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1700" height="1320" fill="#FAFAFA"/>

  <!-- Header -->
  <text x="850" y="46" class="title">EHP VetCare Plus — User Flow</text>
  <text x="850" y="72" class="subtitle">React Native (Expo) · 9 modules · Thai UI · Dusty Rose theme</text>

  <!-- ═════════════════════════ AUTH ═════════════════════════ -->
  <text x="850" y="120" class="section-label">AUTHENTICATION</text>

  <!-- App Launch -->
  <g transform="translate(770, 140)">
    <rect class="box" width="160" height="48" rx="10"/>
    <text x="80" y="22" class="label">App Launch</text>
    <text x="80" y="38" class="sub">entry point</text>
  </g>

  <!-- Login -->
  <g transform="translate(670, 220)">
    <rect class="box-mod-auth" width="160" height="48" rx="10"/>
    <text x="80" y="22" class="label">Login</text>
    <text x="80" y="38" class="sub">email · Google · FB · LINE</text>
  </g>

  <!-- Signup -->
  <g transform="translate(870, 220)">
    <rect class="box-mod-auth" width="160" height="48" rx="10"/>
    <text x="80" y="22" class="label">Signup</text>
    <text x="80" y="38" class="sub">CID · name · phone</text>
  </g>

  <!-- Arrows: App Launch ↓ Login ; Login ⇄ Signup -->
  <path class="edge" d="M 850 188 L 750 220" marker-end="url(#arrow)"/>
  <path class="edge" d="M 830 244 L 870 244" marker-end="url(#arrow)"/>
  <path class="edge" d="M 870 256 L 830 256" marker-end="url(#arrow)"/>

  <!-- ═════════════════════════ MAIN TABS ═════════════════════════ -->

  <!-- Main (Bottom Tab Bar) -->
